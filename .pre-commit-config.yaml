repos:
  # ── Ruff: fast linter + formatter (replaces flake8, isort, black) ──────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── Mypy type checker ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, boto3-stubs, types-requests]
        args: [--ignore-missing-imports, --no-strict-optional]
        files: ^src/

  # ── General code hygiene ─────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml           # Validate YAML files (catches CI workflow errors)
      - id: check-json           # Validate JSON (catches corrupted SOP/telemetry data)
      - id: check-toml           # Validate pyproject.toml
      - id: end-of-file-fixer    # Ensure files end with newline
      - id: trailing-whitespace  # Remove trailing whitespace
      - id: check-merge-conflict # Catch unresolved merge conflicts
      - id: check-added-large-files
        args: ["--maxkb=500"]    # Block accidental large model file commits
      - id: detect-private-key   # Block API key leaks
      - id: check-case-conflict  # Catch macOS/Linux filename casing issues

  # ── Security: detect hardcoded secrets ───────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: (tests/|\.env\.example)
